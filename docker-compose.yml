services:
  alex-agent:
    build: .
    container_name: alex_agent
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      PORT: 3500
    env_file:
      - .env
    volumes:
      - alex_agent_config:/app/config
    networks:
      - alex_net

volumes:
  alex_agent_config:
    driver: local

networks:
  alex_net:
    external: true
    name: alex_alex_net  # ← agrega esta línea