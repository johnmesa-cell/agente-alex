server {
    listen 80;

    # Panel de administración — solo red interna
    location /admin {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;

        auth_basic "ALEX Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://alex-agent:3001/admin;
    }

    # Proxy principal al agente
    location / {
        proxy_pass http://alex-agent:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}